name: Desktop builds

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: ubuntu-22.04
            platform: linux
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        if: runner.os == 'Windows'
        with:
          python-version: "3.12"

      - name: Install Linux GUI libraries
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y python3-tk python3-venv

      - name: Install Windows build tools
        if: runner.os == 'Windows'
        run: python -m pip install --upgrade pip pyinstaller

      - name: Install Linux build tools
        if: runner.os == 'Linux'
        run: |
          python3 -m venv .venv
          .venv/bin/python -m pip install --upgrade pip pyinstaller

      - name: Build standalone Windows app
        if: runner.os == 'Windows'
        run: >-
          python -m PyInstaller --noconfirm --clean --onefile --windowed
          --name DriveRescueAssistant
          --paths src
          script/desktop_entry.py

      - name: Build standalone Linux app
        if: runner.os == 'Linux'
        run: >-
          .venv/bin/python -m PyInstaller --noconfirm --clean --onefile --windowed
          --name DriveRescueAssistant
          --paths src
          script/desktop_entry.py

      - name: Package Windows build
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/DriveRescueAssistant.exe -DestinationPath DriveRescueAssistant-windows-x64.zip

      - name: Package Linux build
        if: runner.os == 'Linux'
        run: tar -C dist -czf DriveRescueAssistant-linux-x64.tar.gz DriveRescueAssistant

      - uses: actions/upload-artifact@v4
        with:
          name: DriveRescueAssistant-${{ matrix.platform }}
          path: DriveRescueAssistant-*

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-files
          merge-multiple: true
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release create "${GITHUB_REF_NAME}" release-files/* --generate-notes --title "Drive Rescue Assistant ${GITHUB_REF_NAME}"
